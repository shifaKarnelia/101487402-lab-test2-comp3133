<mat-form-field appearance="outline" class="house-filter">
  <mat-label>{{ label() }}</mat-label>
  <mat-select
    [formControl]="houseControl"
    (selectionChange)="onSelectionChange($event.value)"
  >
    @for (house of houses; track house) {
      <mat-option [value]="house">{{ house }}</mat-option>
    }
  </mat-select>
</mat-form-field>
